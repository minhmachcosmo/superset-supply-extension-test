services:
  superset:
    image: apache/superset:4.1.1
    container_name: superset_brewery
    ports:
      - "8088:8088"
    environment:
      - SUPERSET_SECRET_KEY=MySuperSecretKey123ChangeThisInProduction456789ABC
      - SUPERSET_ENV=production
      - PYTHONPATH=/app/pythonpath
    volumes:
      - ./supplychain_warehouses.db:/app/supplychain_warehouses.db
      - ./superset_config.py:/app/pythonpath/superset_config.py:ro
      - superset_home:/app/superset_home
    command: >
      bash -c "
      superset db upgrade &&
      superset fab create-admin --username admin --firstname Admin --lastname User --email admin@superset.com --password admin 2>/dev/null || true &&
      superset init &&
      superset run -h 0.0.0.0 -p 8088 --with-threads --reload --debugger
      "
    restart: unless-stopped

volumes:
  superset_home:
